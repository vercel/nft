name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  rustfmt:
    name: Rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - name: Check Rust formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run tests
        run: cargo test --workspace

  napi-smoke:
    name: NAPI smoke - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-latest
          - windows-2025
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo
        if: runner.os != 'Windows'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build NAPI binding
        working-directory: crates/nftrs_napi
        run: npx --yes -p @napi-rs/cli@3 napi build --release --platform
      - name: Ensure generated NAPI declarations are fresh
        if: runner.os == 'Linux'
        run: git diff --exit-code -- crates/nftrs_napi/index.d.ts crates/nftrs_napi/index.js
      - name: Load and trace smoke test
        shell: bash
        run: |
          node - <<'NODE'
          const path = require("path");
          const nftrs = require("./crates/nftrs_napi");
          // Trace a real file (the binding's own loader) so the engine has
          // something to emit.
          const entry = path.join("crates", "nftrs_napi", "index.js");
          const result = nftrs.nodeFileTrace([entry], { base: process.cwd() });
          if (!result.fileList.some((f) => f.replace(/\\/g, "/").endsWith("nftrs_napi/index.js"))) {
            throw new Error("Unexpected fileList: " + JSON.stringify(result.fileList));
          }
          console.log(`@nftrs/core ${nftrs.version()} loaded on ${process.platform}-${process.arch}`);
          NODE

  compat:
    name: Compatibility (test/unit)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build NAPI binding
        working-directory: crates/nftrs_napi
        run: npx --yes -p @napi-rs/cli@3 napi build --release --platform
      - name: Run compatibility harness
        run: node compat/run.mjs
      - name: Check for compatibility regression
        run: node compat/run.mjs --check

  dependency-policy:
    name: Dependency policy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install audit tools
        run: cargo install cargo-audit cargo-deny --locked
      - name: Check Cargo advisories
        run: cargo audit --deny warnings
      - name: Check Cargo licenses
        run: cargo deny check licenses

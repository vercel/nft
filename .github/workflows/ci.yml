name: CI

on:
  push:
    branches:
      - main
    tags:
      - '!*'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Test on node ${{ matrix.node }} and ${{ matrix.os }}
    timeout-minutes: 20
    env:
      COREPACK_DEFAULT_TO_LATEST: '0'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22, 24, 26]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
    services:
      redis:
        # See workaround https://github.com/actions/runner/issues/822#issuecomment-1524826092
        image: ${{ (matrix.os == 'ubuntu-latest') && 'redis:6.0.20' || '' }}
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/setup-python@v5
        with:
          # we lock to 3.11 for a distutils requirement for node-gyp
          python-version: '3.11'
      - name: Enable Corepack
        run: corepack enable npm
      - name: Add PhantomJS install stub
        if: matrix.node == 26 && matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/phantomjs-bin"
          printf '#!/bin/sh\necho 2.1.1\n' > "$RUNNER_TEMP/phantomjs-bin/phantomjs"
          chmod +x "$RUNNER_TEMP/phantomjs-bin/phantomjs"
          echo "$RUNNER_TEMP/phantomjs-bin" >> "$GITHUB_PATH"
      - name: Add PhantomJS install stub
        if: matrix.node == 26 && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $dir = Join-Path $env:RUNNER_TEMP 'phantomjs-bin'
          $project = Join-Path $env:RUNNER_TEMP 'phantomjs-stub'
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          New-Item -ItemType Directory -Force -Path $project | Out-Null

          Set-Content -Path (Join-Path $project 'phantomjs-stub.csproj') -Value @'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net8.0</TargetFramework>
              <ImplicitUsings>disable</ImplicitUsings>
              <Nullable>disable</Nullable>
              <AssemblyName>phantomjs</AssemblyName>
            </PropertyGroup>
          </Project>
          '@

          Set-Content -Path (Join-Path $project 'Program.cs') -Value @'
          using System;
          Console.WriteLine("2.1.1");
          '@

          dotnet publish $project --configuration Release --output $dir --nologo
          $dir | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Install Dependencies
        run: npm install
      - name: Prettier
        if: matrix.os == 'ubuntu-latest'
        run: npm run prettier-check
      - name: Build
        run: npm run build
      - name: Run Tests
        env:
          BULL_REDIS_CONNECTION: ${{ (matrix.os == 'ubuntu-latest') && 'redis://127.0.0.1:6379/0' || '' }}
        run: npm run ${{ (matrix.os == 'ubuntu-latest') && 'test-verbose' || 'test' }}
      - name: Maybe Release
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20 && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN_ELEVATED }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: npx semantic-release@24.2.3
